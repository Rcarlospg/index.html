.setup-tip-overlay.out { animation:fadeOut .4s ease forwards; }

function seasonImg(m){
  if([2,3,4].includes(m))return IMGS.spring;
  if([5,6,7].includes(m))return IMGS.summer;
  if([8,9,10].includes(m))return IMGS.autumn;
  return IMGS.winter;
}
function Logo(h=52){return`<div style="background:#fff;border-radius:10px;padding:5px 9px;display:inline-flex;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.18)"><img src="${LOGO}" style="height:${h}px;width:auto;display:block" alt="STR"></div>`;}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function fdm(y,m){return(new Date(y,m,1).getDay()+6)%7}
function off(pat,sm,sy,sd,tm,ty){
  if(sy===ty&&sm===tm)return((1-sd)%pat.length+pat.length)%pat.length;
  let t=dim(sy,sm)-sd+1,y=sy,m=sm+1;
  if(m>11){m=0;y++;}
  while(y<ty||(y===ty&&m<tm)){t+=dim(y,m);m++;if(m>11){m=0;y++;}}
  return(t%pat.length+pat.length)%pat.length;
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function loadDB(){try{return JSON.parse(localStorage.getItem(SK)||"{}")}catch{return{}}}
function saveDB(){try{localStorage.setItem(SK,JSON.stringify(DB))}catch{}}
let DB=loadDB();
if(!DB.saved)DB.saved=[];
if(!DB.overrides)DB.overrides={};
if(!DB.counters)DB.counters={};
const NOW=new Date();
let S={v:"home",pat:[],sd:1,sm:NOW.getMonth(),sy:NOW.getFullYear(),calId:null,month:NOW.getMonth(),year:NOW.getFullYear(),sel:null,modal:null,mName:"",showR:false,showTip:false};
let rTimer=null,tipTimer=null;
function oKey(d){return`${S.calId}_${S.year}_${S.month}_${d}`}
function cKey(){return`${S.calId}_${S.year}_${S.month}`}
function getOv(d){return DB.overrides[oKey(d)]||null}
function setOv(d,o){if(!o.shift&&!o.comment)delete DB.overrides[oKey(d)];else DB.overrides[oKey(d)]=o;saveDB();}
function getCtr(){return DB.counters[cKey()]||{extras:0,festivos:0}}
function setCtr(o){DB.counters[cKey()]=o;saveDB();}
function hasSaved(){return DB.saved.length>0;}
function toast(msg){
  const el=document.createElement("div");
  el.style.cssText="position:absolute;top:12px;left:50%;transform:translateX(-50%);background:#1a4530;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;white-space:nowrap;pointer-events:none";
  el.textContent=msg;document.getElementById("app").appendChild(el);
  setTimeout(()=>el.remove(),2200);
}
function showSetupTip(){
  if(hasSaved())return;
  if(tipTimer)clearTimeout(tipTimer);
  S.showTip=true;render();
  tipTimer=setTimeout(()=>closeTip(),5000);
}
function closeTip(){
  if(tipTimer)clearTimeout(tipTimer);tipTimer=null;
  const el=document.querySelector(".setup-tip-overlay");
  if(el)el.classList.add("out");
  setTimeout(()=>{S.showTip=false;render();},420);
}
function showReminder(){
  if(hasSaved())return;
  if(rTimer)clearTimeout(rTimer);
  S.showR=true;render();
  rTimer=setTimeout(()=>{
    const el=document.querySelector(".reminder-bubble");
    if(el)el.classList.add("out");
    setTimeout(()=>{S.showR=false;render();},460);
  },4000);
}

      <div style="border-top:1px solid #f0f0f0;padding-top:12px">
        <div style="font-size:10px;font-weight:700;color:#777;margin-bottom:6px;display:flex;align-items:center;gap:5px"><span>💬</span> Comentario</div>
        <textarea id="dayComment" style="width:100%;padding:10px 12px;font-size:13px;border:2px solid ${curCm?"#E31E24":"#ddd"};border-radius:10px;outline:none;color:#111;box-sizing:border-box;font-family:inherit;resize:none;height:64px;line-height:1.4" placeholder="Ej: Cambio con Ana, guardia extra...">${curCm}</textarea>
        ${curCm?`<div style="font-size:10px;color:#E31E24;font-weight:600;margin-top:3px">● Guardado · marcado en el calendario</div>`:""}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="clearDay()" style="flex:1;background:#f5f5f5;border:none;border-radius:10px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;color:#888">Restablecer</button>
        <button onclick="applyDay()" style="flex:2;background:linear-gradient(135deg,#E31E24,#b71c1c);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:800;cursor:pointer;color:#fff">Guardar cambios</button>
      </div>
    </div>
  </div>`:"";

  const mp=S.modal==="mp"?`<div onclick="if(event.target===this){S.modal=null;render()}" style="position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:18px;box-sizing:border-box">
    <div style="background:#fff;border-radius:20px;padding:18px;width:100%;box-sizing:border-box" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px"><div style="font-size:15px;font-weight:900;color:#111">Ir a mes y año</div>
      <button onclick="S.modal=null;render()" style="background:#f0f0f0;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;color:#666">✕</button></div>
      <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px">Mes</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:13px">
        ${MO.map((m,i)=>`<button onclick="S.month=${i};render()" style="padding:8px 3px;border-radius:9px;border:2px solid ${S.month===i?"#E31E24":"#eee"};background:${S.month===i?"#fde8e8":"#fafafa"};font-size:11px;font-weight:${S.month===i?800:600};color:${S.month===i?"#E31E24":"#555"};cursor:pointer">${m.slice(0,3)}</button>`).join("")}
      </div>
      <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px">Año</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px">
        ${[2024,2025,2026,2027,2028,2029].map(y=>`<button onclick="S.year=${y};render()" style="padding:9px 3px;border-radius:9px;border:2px solid ${S.year===y?"#E31E24":"#eee"};background:${S.year===y?"#fde8e8":"#fafafa"};font-size:12px;font-weight:${S.year===y?800:600};color:${S.year===y?"#E31E24":"#555"};cursor:pointer">${y}</button>`).join("")}
      </div>
    </div>
  </div>`:"";

  const smModal=S.modal==="sc"?`<div onclick="if(event.target===this){S.modal=null;render()}" style="position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;z-index:100">
    <div style="background:#fff;border-radius:22px 22px 0 0;padding:22px 18px 28px;width:100%;box-sizing:border-box" onclick="event.stopPropagation()">
      <div style="font-size:17px;font-weight:900;color:#111;margin-bottom:5px">💾 Guardar Calendario</div>
      <div style="font-size:11px;color:#888;margin-bottom:13px">Dale un nombre para identificarlo</div>
      <input id="mname" value="${S.mName}" oninput="S.mName=this.value" placeholder="Ej: Turno Planta A" style="width:100%;padding:11px 12px;font-size:14px;font-weight:700;border:2px solid #ddd;border-radius:9px;outline:none;color:#111;margin-bottom:12px;box-sizing:border-box;font-family:inherit">
      <div style="display:flex;gap:9px">
        <button onclick="S.modal=null;render()" style="flex:1;background:#f0f0f0;border:none;border-radius:9px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;color:#888">Cancelar</button>
        <button onclick="saveCal()" style="flex:2;background:linear-gradient(135deg,#E31E24,#b71c1c);border:none;border-radius:9px;padding:12px;font-size:13px;font-weight:800;cursor:pointer;color:#fff">Guardar →</button>
      </div>
    </div>
  </div>`:"";

  return`<div style="display:flex;flex-direction:column;flex:1;overflow-y:auto;position:relative">
    ${hdr}${grid}${statsBar}${legend}${counters}${fab}${reminder}${dayM}${mp}${smModal}
  </div>`;
}

/* ══ FUNCIONES ══ */
function render(){document.getElementById("app").innerHTML=S.v==="home"?renderHome():S.v==="setup"?renderSetup():renderCalendar();}
function goHome(){if(rTimer)clearTimeout(rTimer);if(tipTimer)clearTimeout(tipTimer);S.v="home";S.sel=null;S.modal=null;S.showR=false;S.showTip=false;render();}
function goSetup(){if(rTimer)clearTimeout(rTimer);if(tipTimer)clearTimeout(tipTimer);S.v="setup";S.sel=null;S.modal=null;S.showR=false;S.showTip=false;render();showSetupTip();}
function prevM(){S.sel=null;S.modal=null;S.month===0?(S.month=11,S.year--):S.month--;render();}
function nextM(){S.sel=null;S.modal=null;S.month===11?(S.month=0,S.year++):S.month++;render();}
function goCal(){if(S.pat.length>=2){S.month=S.sm;S.year=S.sy;S.v="calendar";S.showR=false;render();showReminder();}}
function addSh(k){S.pat=[...S.pat,k];render();}
function rmSh(i){S.pat=S.pat.filter((_,j)=>j!==i);render();}
function adjCtr(f,d){const c=getCtr();c[f]=Math.max(0,c[f]+d);setCtr(c);render();}
function openDay(d){S.sel=d;S.modal="day";render()}
function selSh(k){const ov=getOv(S.sel)||{};const ta=document.getElementById("dayComment");if(ta)ov.comment=ta.value;ov.shift=k;setOv(S.sel,ov);render();setTimeout(()=>{const t=document.getElementById("dayComment");if(t)t.focus();},20);}
function applyDay(){
  const ov=getOv(S.sel)||{};const ta=document.getElementById("dayComment");if(ta)ov.comment=ta.value;
  const o2=off(S.pat,S.sm,S.sy,S.sd,S.month,S.year),base=S.pat[(o2+S.sel-1)%S.pat.length];
  if((!ov.shift||ov.shift===base)&&(!ov.comment||!ov.comment.trim()))delete DB.overrides[oKey(S.sel)];
  else setOv(S.sel,ov);
  S.modal=null;render();toast("✓ Cambios guardados");
}
function clearDay(){delete DB.overrides[oKey(S.sel)];saveDB();S.modal=null;render();toast("Turno restablecido")}
function openModal(){const ex=DB.saved.find(x=>x.id===S.calId);S.mName=ex?ex.name:"";S.modal="sc";render();setTimeout(()=>{const el=document.getElementById("mname");if(el)el.focus()},30)}
function saveCal(){
  const name=(S.mName||"").trim()||"Mi Calendario";
  if(S.calId&&DB.saved.find(x=>x.id===S.calId)){
    DB.saved=DB.saved.map(x=>x.id===S.calId?{...x,name,pat:S.pat,sd:S.sd,sm:S.sm,sy:S.sy}:x);toast("✓ Actualizado");
  }else{
    const id=uid();S.calId=id;DB.saved=[{id,name,pat:S.pat,sd:S.sd,sm:S.sm,sy:S.sy},...DB.saved];toast("✓ Guardado");
  }
  saveDB();S.modal=null;render();
}
function openCal(id){
  const c=DB.saved.find(x=>x.id===id);if(!c)return;
  Object.assign(S,{pat:c.pat,sd:c.sd||1,sm:c.sm,sy:c.sy,month:c.sm,year:c.sy,calId:id,sel:null,modal:null,v:"calendar",showR:false});
  render();
}
function delCal(id){DB.saved=DB.saved.filter(x=>x.id!==id);saveDB();render();toast("Eliminado")}
render();
</script>
</body>
